<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SafeDose Status</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:#f4f6fb;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
  .card{background:white;border-radius:24px;padding:32px 28px;max-width:380px;width:100%;box-shadow:0 4px 24px rgba(15,23,42,.08);text-align:center}
  .logo{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:28px}
  .logo-mark{width:32px;height:32px;background:#1a56db;border-radius:9px;display:flex;align-items:center;justify-content:center}
  .logo-name{font-size:16px;font-weight:700;color:#0d1829}
  .logo-name em{font-style:normal;color:#1a56db}
  .status-circle{width:96px;height:96px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:36px}
  .s-green{background:#dcfce7;border:3px solid #4ade80}
  .s-yellow{background:#fef9c3;border:3px solid #facc15}
  .s-red{background:#fee2e2;border:3px solid #f87171}
  .status-label{font-size:24px;font-weight:800;margin-bottom:6px}
  .s-green .status-label,.label-green{color:#166534}
  .s-yellow .status-label,.label-yellow{color:#854d0e}
  .s-red .status-label,.label-red{color:#991b1b}
  .person-name{font-size:15px;color:#64748b;margin-bottom:20px}
  .dose-row{background:#f4f6fb;border-radius:14px;padding:14px 18px;margin-bottom:20px}
  .dose-count{font-size:32px;font-weight:800;color:#0d1829;line-height:1}
  .dose-label{font-size:13px;color:#64748b;margin-top:4px}
  .dose-bar-wrap{background:#e2e8f0;border-radius:99px;height:8px;margin-top:12px;overflow:hidden}
  .dose-bar{height:100%;border-radius:99px;transition:width .6s ease}
  .divider{height:1px;background:#e2e8f0;margin:0 0 16px}
  .update-note{font-size:12px;color:#94a3b8;line-height:1.5}
  .ts{font-size:11px;color:#cbd5e1;margin-top:8px}
  .pill-logo svg{width:18px;height:18px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/></svg>
    </div>
    <span class="logo-name">Safe<em>Dose</em></span>
  </div>

  <div id="statusCircle" class="status-circle"></div>
  <div id="statusLabel" class="status-label"></div>
  <div id="personName" class="person-name"></div>

  <div class="dose-row">
    <div id="doseCount" class="dose-count"></div>
    <div id="doseLabel" class="dose-label"></div>
    <div class="dose-bar-wrap">
      <div id="doseBar" class="dose-bar"></div>
    </div>
  </div>

  <div class="divider"></div>
  <div class="update-note">This status updates when <span id="personNameInline">they</span> open SafeDose. Share this link with family so they can check in any time — no app needed.</div>
  <div id="timestamp" class="ts"></div>
</div>

<script>
const p = new URLSearchParams(window.location.search);
const name   = p.get('name')   || 'Your family member';
const status = p.get('status') || 'green';
const taken  = parseInt(p.get('taken') || '0');
const total  = parseInt(p.get('total') || '0');
const ts     = parseInt(p.get('ts')    || '0');

const configs = {
  green:  { emoji: '✅', label: 'All good',       cls: 's-green', barColor: '#4ade80', labelCls: 'label-green' },
  yellow: { emoji: '🟡', label: 'Check in',       cls: 's-yellow', barColor: '#facc15', labelCls: 'label-yellow' },
  red:    { emoji: '🔴', label: 'Needs attention', cls: 's-red',   barColor: '#f87171', labelCls: 'label-red' },
};
const c = configs[status] || configs.green;
const pct = total > 0 ? Math.round((taken / total) * 100) : 0;

document.getElementById('statusCircle').className = 'status-circle ' + c.cls;
document.getElementById('statusCircle').textContent = c.emoji;
document.getElementById('statusLabel').textContent  = c.label;
document.getElementById('statusLabel').className    = 'status-label ' + c.labelCls;
document.getElementById('personName').textContent   = name;
document.getElementById('personNameInline').textContent = name.split(' ')[0] || 'they';
document.getElementById('doseCount').textContent    = taken + ' / ' + (total || '—');
document.getElementById('doseLabel').textContent    = 'doses taken today';
document.getElementById('doseBar').style.width      = pct + '%';
document.getElementById('doseBar').style.background = c.barColor;

if (ts) {
  const d = new Date(ts);
  const fmt = d.toLocaleString('en-GB', { weekday:'short', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
  document.getElementById('timestamp').textContent = 'Last updated ' + fmt;
}
document.title = name + ' — SafeDose Status';
</script>
</body>
</html>
